name: Deploy Sitara to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Flutter ───────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: sitara_app
        run: flutter pub get

      # ── 4. Build Flutter Web ─────────────────────────────────────
      - name: Build Flutter Web
        working-directory: sitara_app
        run: flutter build web --release --web-renderer html

      # ── 5. Deploy to Firebase Hosting ────────────────────────────
      - name: Deploy to Firebase Hosting (Preview — PRs)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: sitara-v1-495117
          channelId: 'pr-${{ github.event.number }}'
          entryPoint: './sitara_app'

      - name: Deploy to Firebase Hosting (Live — main branch)
        if: github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: sitara-v1-495117
          channelId: live
          entryPoint: './sitara_app'
